<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDS 3D Medical Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        #viewer-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #canvas-3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        #controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            min-width: 280px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls-panel h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            color: #555;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .control-group input[type="checkbox"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label:hover {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 4px;
            padding: 4px;
            margin: 0 -4px 4px -4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
            margin-bottom: 8px;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .value-display {
            display: inline-block;
            min-width: 40px;
            text-align: right;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="viewer-container">
        <canvas id="canvas-3d"></canvas>

        <div id="loading">
            <div class="spinner"></div>
            <div>Loading 3D viewer...</div>
        </div>

        <div id="controls-panel" style="display: none;">
            <h3>🎨 3D Viewer Controls</h3>

            <div class="control-group">
                <button id="btn-reset">🔄 Reset View</button>
            </div>

            <h3>👁️ Visibility</h3>
            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="show-body" checked>
                    <span>Body Outline</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-soft-tissue" checked>
                    <span>Soft Tissue</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-colon" checked>
                    <span>🟠 Colon</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-tumors" checked>
                    <span>🔴 Tumors</span>
                </label>
            </div>

            <h3>🎚️ Transparency</h3>
            <div class="control-group">
                <label>
                    Colon Opacity: <span class="value-display" id="val-colon">0.3</span>
                </label>
                <input type="range" id="opacity-colon" min="0" max="1" step="0.05" value="0.3">
            </div>

            <div class="control-group">
                <label>
                    Soft Tissue Opacity: <span class="value-display" id="val-tissue">0.2</span>
                </label>
                <input type="range" id="opacity-tissue" min="0" max="1" step="0.05" value="0.2">
            </div>

            <div class="control-group">
                <label>
                    Body Opacity: <span class="value-display" id="val-body">0.1</span>
                </label>
                <input type="range" id="opacity-body" min="0" max="1" step="0.05" value="0.1">
            </div>

            <h3>📏 Scale</h3>
            <div class="control-group">
                <label>
                    Tumor Marker Size: <span class="value-display" id="val-tumor">1.0</span>
                </label>
                <input type="range" id="scale-tumor" min="0.5" max="3" step="0.1" value="1.0">
            </div>
        </div>

        <div id="info-panel">
            <div>🖱️ Left-drag: Rotate</div>
            <div>🔍 Scroll: Zoom</div>
            <div>⚙️ Right-drag: Pan</div>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Viewer logic -->
    <script src="viewer3d.js"></script>
</body>

</html>
