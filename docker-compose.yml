version: '3.8'

services:
  # FastAPI Backend
  adds-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adds-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=9
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///data/analysis_results.db
      - MODEL_CACHE_DIR=/app/models
      - GPU_ENABLED=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./configs:/app/configs
    networks:
      - adds-network
    command: [ "gunicorn", "-c", "backend/gunicorn_config.py", "backend.main:app" ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Streamlit UI
  adds-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adds-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://adds-api:8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    networks:
      - adds-network
    depends_on:
      adds-api:
        condition: service_healthy
    command: [ "streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  adds-network:
    driver: bridge

volumes:
  models-cache:
  analysis-data:
  logs:
