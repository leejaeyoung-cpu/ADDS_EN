# SOTA Training Configuration - OPTIMIZED FOR TUMOR DETECTION
# Fixed issues from previous training (Dice 0.0096)

model:
  type: "swin_unetr"
  img_size: [96, 96, 96]
  in_channels: 3  # Multi-window (Soft Tissue, Abdominal, Liver)
  out_channels: 2
  feature_size: 48
  use_pretrained: false
  use_checkpoint: true

data:
  root: "data/medical_decathlon/Task10_Colon"
  target_spacing: [1.5, 1.5, 2.0]
  patch_size: [96, 96, 96]
  n_folds: 5
  use_cache: false
  # CRITICAL: Focus on tumor patches
  use_3d_context: true
  context_size: 5
  tumor_focused_sampling: true  # Force tumor-containing patches

training:
  batch_size: 2
  num_epochs: 100
  learning_rate: 0.0005  # FIXED: 10x higher (was 5e-5, now 5e-4)
  weight_decay: 0.00001
  gradient_accumulation_steps: 4  # Effective batch = 8
  use_amp: true
  early_stopping_patience: 20  # FIXED: More aggressive early stopping
  val_interval: 1  # Validate every epoch

optimizer:
  type: "AdamW"
  betas: [0.9, 0.999]
  eps: 0.00000001

scheduler:
  type: "ReduceLROnPlateau"  # CHANGED: More adaptive
  mode: "max"  # Maximize Dice
  factor: 0.5
  patience: 10
  min_lr: 0.00001

loss:
  type: "FocalDiceCELoss"  # CHANGED: Simpler, proven loss
  # Tumor-focused weights
  focal_weight: 0.5
  dice_weight: 0.4
  ce_weight: 0.1
  focal_alpha: 0.75     # Higher weight to minority class (tumor)
  focal_gamma: 2.5      # More focus on hard examples
  dice_smooth: 0.00001

augmentation:
  # STRONGER augmentation
  rotation_range: [-20, 20]  # Increased
  scaling_range: [0.85, 1.15]  # Increased
  elastic_alpha: 15  # Increased
  elastic_sigma: 4
  intensity_shift_range: 0.15  # Increased
  noise_std: 0.02  # Increased
  augmentation_prob: 0.7  # Increased from 0.5

logging:
  log_dir: "runs/sota_optimized_v1"
  checkpoint_dir: "models/sota_optimized_v1"
  save_interval: 5
  log_interval: 10
  max_checkpoints_to_keep: 5  # Save disk space

wandb:
  enabled: false
  project: "adds-tumor-segmentation"
  entity: "inha-biomedical"
  name: "swin_unetr_optimized_v1"

device: "cuda"
num_workers: 0
pin_memory: true
