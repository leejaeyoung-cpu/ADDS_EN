version: '3.8'

services:
  # FastAPI Backend with GPU
  adds-api:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: adds-api-gpu
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///data/analysis_results.db
      - MODEL_CACHE_DIR=/app/models
      - GPU_ENABLED=true
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./configs:/app/configs
    networks:
      - adds-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    runtime: nvidia
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; import torch; assert torch.cuda.is_available(); requests.get('http://localhost:8000/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Streamlit UI
  adds-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adds-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://adds-api:8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    networks:
      - adds-network
    depends_on:
      adds-api:
        condition: service_healthy
    command: [ "streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  adds-network:
    driver: bridge

volumes:
  models-cache:
  analysis-data:
  logs:
