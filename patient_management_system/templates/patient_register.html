<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환자 등록 - ADDS</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-container">
        <div class="container">
            <div class="page-header">
                <h1>환자 등록</h1>
                <p class="subtitle">새로운 환자 정보를 입력하세요</p>
            </div>

            <div class="form-card">
                <form id="patientForm">
                    <div class="form-group">
                        <label for="name">환자 이름 *</label>
                        <input type="text" id="name" name="name" required placeholder="홍길동" class="form-input">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="birthdate">생년월일 *</label>
                            <input type="date" id="birthdate" name="birthdate" required class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="gender">성별 *</label>
                            <select id="gender" name="gender" required class="form-input">
                                <option value="">선택하세요</option>
                                <option value="M">남성</option>
                                <option value="F">여성</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="contact">연락처</label>
                        <input type="tel" id="contact" name="contact" placeholder="010-1234-5678" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="address">주소</label>
                        <textarea id="address" name="address" rows="3" placeholder="서울시 강남구..."
                            class="form-input"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="window.location.href='/'" class="btn btn-secondary">
                            취소
                        </button>
                        <button type="submit" class="btn btn-primary">
                            등록
                        </button>
                    </div>
                </form>

                <div id="successMessage" class="success-message" style="display: none;">
                    <h3>환자 등록 완료!</h3>
                    <p>환자 ID: <strong id="newPatientId"></strong></p>
                    <button onclick="window.location.href='/patient/search'" class="btn btn-primary">
                        환자 관리로 이동
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        document.getElementById('patientForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                birthdate: document.getElementById('birthdate').value,
                gender: document.getElementById('gender').value,
                contact: document.getElementById('contact').value || null,
                address: document.getElementById('address').value || null
            };

            try {
                const response = await fetch('/api/patients/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('newPatientId').textContent = data.patient_id;
                    document.getElementById('patientForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    window.ADDS.showToast('환자 등록 완료!', 'success');
                } else {
                    const error = await response.json();
                    window.ADDS.showToast('등록 실패: ' + error.detail, 'error');
                }
            } catch (error) {
                window.ADDS.showToast('서버 오류: ' + error.message, 'error');
            }
        });
    </script>

    <style>
        .page-container {
            min-height: 100vh;
            background: var(--gradient-primary);
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        .page-header {
            text-align: center;
            color: var(--white);
            margin-bottom: var(--spacing-xl);
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-sm);
        }

        .subtitle {
            font-size: 1.125rem;
            opacity: 0.9;
        }

        .form-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-2xl);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            color: var(--dark);
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            transition: all var(--transition-base);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-xl);
        }

        .btn-secondary {
            background: var(--gray);
            color: var(--white);
        }

        .btn-secondary:hover {
            background: var(--dark-600);
        }

        .success-message {
            text-align: center;
            padding: var(--spacing-xl);
        }

        .success-message h3 {
            color: var(--success);
            font-size: 1.75rem;
            margin-bottom: var(--spacing-md);
        }

        .success-message strong {
            color: var(--primary);
            font-size: 1.25rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</body>

</html>
